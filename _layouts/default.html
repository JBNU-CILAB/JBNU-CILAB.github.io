<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }} — {{ site.subtitle }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph (링크 공유 시 미리보기) -->
  <meta property="og:title" content="{{ site.lab.name_en }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">

  <!-- 한글 웹폰트 Pretendard -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
</head>
<body>
  {% include header.html %}

  <main class="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // 모바일 햄버거 메뉴 토글
    document.querySelector('.nav-toggle').addEventListener('click', function () {
      document.querySelector('.nav-links').classList.toggle('open');
      this.classList.toggle('active');
    });

    // 이메일 조립 (크롤링 방지: HTML 소스에는 완성된 주소가 없음)
    document.querySelectorAll('a.eml').forEach(function (el) {
      var addr = el.dataset.u + '@' + el.dataset.d;
      el.href = 'mailto:' + addr;
      if (!el.textContent.trim()) el.textContent = addr;
    });
  </script>
</body>
</html>
