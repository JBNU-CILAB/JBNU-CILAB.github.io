---
layout: default
title: Research
permalink: /research/
---

<div class="page-head">
  <div class="container">
    <span class="eyebrow">Research</span>
    <h1>연구 분야</h1>
    <p class="lead">컴파일러 최적화를 기반으로 소프트웨어의 성능과 효율을 높이는 연구를 수행합니다.</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="grid grid-3">
      {% for r in site.data.research %}
      <div class="card">
        <div class="icon">{{ r.icon }}</div>
        <h3>{{ r.title }}</h3>
        <p class="card-sub">{{ r.title_en }}</p>
        <p>{{ r.desc }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
