# ── 연구 분야 ──────────────────────────────────────
# Home/Research 페이지에 카드로 표시되고, Research 페이지 하단에 상세 섹션이 생깁니다.
# - icon: 이모지 하나
# - id: 상세 섹션 앵커 (카드 클릭 시 /research/#id 로 이동)
# - image: 상세 섹션 상단 그림 (비우면 그림 없이 표시)
# - details: 상세 설명 문단 목록 (문단 단위로 항목 추가)
# - keywords: 키워드 태그 목록

- icon: "🌐"
  title: "웹 엔진"
  title_en: "Web Engines"
  id: "web-engines"
  desc: "웹 브라우저의 핵심 실행 환경인 자바스크립트 엔진과 웹어셈블리(WebAssembly) 엔진을 분석하고, 실행 성능을 높이기 위한 최적화 기법을 연구합니다."
  image: "/assets/img/research/web-engine.svg"
  details:
    - >-
      웹 애플리케이션이 점점 복잡해지면서, 브라우저에서 코드를 실행하는 웹 엔진의 성능이
      사용자 경험을 좌우하고 있습니다. 본 연구실은 자바스크립트 엔진과 웹어셈블리(WebAssembly)
      엔진의 내부 구조 — 파서, 인터프리터, JIT 컴파일러 — 를 깊이 분석하고, 더 빠른 실행과
      효율적인 메모리 사용을 위한 최적화 기법을 연구합니다.
    - >-
      주요 연구 주제로는 JIT 컴파일러의 코드 생성 품질 개선, 프로파일 기반 재최적화 정책,
      가비지 컬렉션 등 메모리 관리 최적화, 그리고 웹어셈블리 실행 성능 분석이 있습니다.
      연구는 실제로 널리 쓰이는 오픈소스 웹 엔진 프로젝트를 대상으로 진행합니다 —
      실제 엔진 코드 위에서 워크로드를 프로파일링하고 병목을 찾아 개선하는 실증적 접근을
      지향하며, 연구 성과가 실사용 엔진에 기여할 수 있도록 합니다.
  keywords:
    - "JavaScript 엔진"
    - "WebAssembly"
    - "JIT 컴파일"
    - "메모리 최적화"
    - "성능 프로파일링"
    - "오픈소스"

- icon: "🤖"
  title: "LLM 응용 시스템"
  title_en: "LLM-based System"
  id: "llm-system"
  desc: "오픈 웨이트(open-weight) LLM을 활용하여 다양한 작업을 자동화하는 지능형 시스템을 설계하고 구축하는 연구를 수행합니다."
  image: "/assets/img/research/llm-system.svg"
  details:
    - >-
      오픈 웨이트(open-weight) LLM의 등장으로, 외부 API에 의존하지 않고 자체 환경에서
      대규모 언어 모델을 활용할 수 있게 되었습니다. 본 연구실은 이러한 공개 모델을 기반으로
      반복적인 작업을 자동화하고 지능형 서비스를 구축하는 시스템을 연구합니다.
    - >-
      주어진 작업에 맞는 프롬프트 설계, 외부 도구·API와의 연동(Tool Use), 작업을 스스로
      계획하고 수행하는 에이전트 파이프라인 구성이 핵심 연구 주제입니다. 시스템이 낸 결과를
      평가하고 피드백하여 파이프라인을 지속적으로 개선하는 방법, 그리고 소프트웨어 개발·분석
      도구에 LLM을 접목하는 응용 연구도 함께 수행합니다.
  keywords:
    - "Open-weight LLM"
    - "프롬프트 엔지니어링"
    - "Tool Use"
    - "LLM 에이전트"
    - "자동화 시스템"

- icon: "🧠"
  title: "AI 컴파일러"
  title_en: "AI Compiler"
  id: "ai-compiler"
  desc: "딥러닝 모델이 다양한 하드웨어에서 효율적으로 실행되도록 컴파일 및 최적화하는 기술을 연구합니다."
  image: "/assets/img/research/ai-compiler.svg"
  details:
    - >-
      딥러닝 모델은 CPU, GPU, NPU 등 서로 다른 특성의 하드웨어에서 실행됩니다.
      학습 프레임워크로 만든 모델이 각 하드웨어의 성능을 최대한 끌어내며 동작하려면,
      모델을 하드웨어에 맞는 코드로 변환하고 최적화하는 AI 컴파일러가 필수적입니다.
    - >-
      본 연구실은 딥러닝 모델을 중간 표현(IR)으로 변환하고, 연산자 융합·불필요한 연산 제거
      같은 그래프 수준 최적화를 거쳐, 타깃 하드웨어별 고성능 커널을 생성하는 컴파일 전 과정을
      연구합니다. 아울러 하드웨어별 최적 실행 스케줄을 자동으로 탐색하는 오토튜닝 기법을 통해,
      다양한 환경에서 딥러닝 추론의 효율을 높이는 것을 목표로 합니다.
  keywords:
    - "딥러닝 컴파일러"
    - "중간 표현(IR)"
    - "그래프 최적화"
    - "코드 생성"
    - "오토튜닝"
