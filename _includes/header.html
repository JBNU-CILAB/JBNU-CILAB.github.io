<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">CILAB</span>
      <span class="brand-sub">Compiler Intelligence Lab</span>
    </a>

    <button class="nav-toggle" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav-links">
      {% for item in site.nav %}
        {% assign target = item.url | relative_url %}
        <a href="{{ target }}"
           class="{% if page.url == item.url %}active{% endif %}">{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
