<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" role="img" aria-label="웹 엔진 연구 개요: 더 빠른 실행과 메모리 최적화를 목표로, 자바스크립트와 웹어셈블리 코드를 실행하는 웹 엔진(Parser, Interpreter, JIT 컴파일러)을 연구합니다.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b636e"/>
    </marker>
  </defs>

  <style>
    text { font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    .t-main  { font-size: 15px; font-weight: 700; fill: #1a1d21; }
    .t-sub   { font-size: 11px; fill: #5b636e; }
    .t-title { font-size: 17px; font-weight: 800; fill: #1a1d21; }
    .t-stage { font-size: 13px; font-weight: 700; fill: #1f4e8c; }
    .t-stage-sub { font-size: 10px; fill: #5b636e; }
    .t-goal  { font-size: 15px; font-weight: 700; fill: #1f4e8c; }
    .t-goal-sub { font-size: 11px; fill: #5b636e; }
    .t-label { font-size: 11px; font-weight: 700; fill: #5b636e; letter-spacing: 1px; }
    .box     { fill: #ffffff; stroke: #e6e8ec; stroke-width: 1.5; }
    .stage   { fill: #eaf1fa; }
    .goal    { fill: #eaf1fa; }
    .flow    { stroke: #5b636e; stroke-width: 1.5; fill: none; }
  </style>

  <!-- 연구 목표 (상단 중앙) -->
  <text class="t-label" x="330" y="30" text-anchor="middle">연구 목표</text>
  <rect class="goal" x="130" y="42" width="190" height="56" rx="12"/>
  <text class="t-goal"     x="225" y="66" text-anchor="middle">⚡ 더 빠른 실행</text>
  <text class="t-goal-sub" x="225" y="85" text-anchor="middle">웹 애플리케이션 성능 향상</text>

  <rect class="goal" x="340" y="42" width="190" height="56" rx="12"/>
  <text class="t-goal"     x="435" y="66" text-anchor="middle">💾 메모리 최적화</text>
  <text class="t-goal-sub" x="435" y="85" text-anchor="middle">메모리 사용량 절감</text>

  <!-- 입력: 소스 코드 -->
  <rect class="box" x="30" y="160" width="180" height="64" rx="12"/>
  <g><!-- JS 로고 -->
    <rect x="46" y="178" width="28" height="28" rx="5" fill="#f7df1e"/>
    <text x="60" y="198" text-anchor="middle" font-size="13" font-weight="800" fill="#1a1d21">JS</text>
  </g>
  <text class="t-main" x="88" y="188">JavaScript</text>
  <text class="t-sub"  x="88" y="206">.js 소스 코드</text>

  <rect class="box" x="30" y="280" width="180" height="64" rx="12"/>
  <g><!-- WebAssembly 로고 -->
    <rect x="46" y="298" width="28" height="28" rx="5" fill="#654ff0"/>
    <text x="60" y="317" text-anchor="middle" font-size="10.5" font-weight="800" fill="#ffffff">WA</text>
  </g>
  <text class="t-main" x="88" y="308">WebAssembly</text>
  <text class="t-sub"  x="88" y="326">.wasm 모듈</text>

  <line class="flow" x1="214" y1="192" x2="262" y2="192" marker-end="url(#arrow)"/>
  <line class="flow" x1="214" y1="312" x2="262" y2="312" marker-end="url(#arrow)"/>

  <!-- 웹 엔진 -->
  <rect x="270" y="140" width="360" height="240" rx="14" fill="#ffffff" stroke="#1f4e8c" stroke-width="1.5"/>
  <text class="t-title" x="450" y="173" text-anchor="middle">⚙️ 웹 엔진</text>
  <text class="t-sub"   x="450" y="193" text-anchor="middle">JavaScript · WebAssembly 엔진</text>

  <rect class="stage" x="294" y="220" width="96" height="56" rx="10"/>
  <text class="t-stage" x="342" y="245" text-anchor="middle">Parser</text>
  <text class="t-stage-sub" x="342" y="263" text-anchor="middle">구문 분석</text>

  <rect class="stage" x="402" y="220" width="96" height="56" rx="10"/>
  <text class="t-stage" x="450" y="245" text-anchor="middle">Interpreter</text>
  <text class="t-stage-sub" x="450" y="263" text-anchor="middle">바이트코드 실행</text>

  <rect class="stage" x="510" y="220" width="96" height="56" rx="10"/>
  <text class="t-stage" x="558" y="245" text-anchor="middle">JIT 컴파일러</text>
  <text class="t-stage-sub" x="558" y="263" text-anchor="middle">핫 코드 최적화</text>

  <line class="flow" x1="392" y1="248" x2="400" y2="248" marker-end="url(#arrow)"/>
  <line class="flow" x1="500" y1="248" x2="508" y2="248" marker-end="url(#arrow)"/>

  <!-- 프로파일 기반 재최적화 루프 -->
  <path class="flow" stroke-dasharray="4 4" d="M558,280 C558,318 450,318 450,284" marker-end="url(#arrow)"/>
  <text class="t-stage-sub" x="504" y="332" text-anchor="middle">프로파일 기반 재최적화</text>
</svg>
