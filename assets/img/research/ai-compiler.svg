<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="AI 컴파일러 연구 개요: 효율적인 실행과 다양한 하드웨어 지원을 목표로, 딥러닝 모델을 IR 변환, 그래프 최적화, 코드 생성을 거쳐 CPU, GPU, NPU에서 실행되도록 컴파일합니다.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b636e"/>
    </marker>
  </defs>

  <style>
    text { font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    .t-main  { font-size: 15px; font-weight: 700; fill: #1a1d21; }
    .t-sub   { font-size: 11px; fill: #5b636e; }
    .t-title { font-size: 17px; font-weight: 800; fill: #1a1d21; }
    .t-stage { font-size: 13px; font-weight: 700; fill: #1f4e8c; }
    .t-stage-sub { font-size: 10px; fill: #5b636e; }
    .t-goal  { font-size: 15px; font-weight: 700; fill: #1f4e8c; }
    .t-goal-sub { font-size: 11px; fill: #5b636e; }
    .t-label { font-size: 11px; font-weight: 700; fill: #5b636e; letter-spacing: 1px; }
    .box     { fill: #ffffff; stroke: #e6e8ec; stroke-width: 1.5; }
    .stage   { fill: #eaf1fa; }
    .goal    { fill: #eaf1fa; }
    .flow    { stroke: #5b636e; stroke-width: 1.5; fill: none; }
  </style>

  <!-- 연구 목표 (상단 중앙) -->
  <text class="t-label" x="440" y="30" text-anchor="middle">연구 목표</text>
  <rect class="goal" x="240" y="42" width="190" height="56" rx="12"/>
  <text class="t-goal"     x="335" y="66" text-anchor="middle">⚡ 효율적인 실행</text>
  <text class="t-goal-sub" x="335" y="85" text-anchor="middle">딥러닝 추론 성능 향상</text>

  <rect class="goal" x="450" y="42" width="190" height="56" rx="12"/>
  <text class="t-goal"     x="545" y="66" text-anchor="middle">🔌 다양한 하드웨어</text>
  <text class="t-goal-sub" x="545" y="85" text-anchor="middle">CPU · GPU · NPU 지원</text>

  <!-- 입력: 딥러닝 모델 -->
  <rect class="box" x="30" y="228" width="180" height="64" rx="12"/>
  <g><!-- 모델 배지 -->
    <rect x="46" y="246" width="28" height="28" rx="5" fill="#eaf1fa"/>
    <text x="60" y="265" text-anchor="middle" font-size="14">🧠</text>
  </g>
  <text class="t-main" x="88" y="256">딥러닝 모델</text>
  <text class="t-sub"  x="88" y="274">PyTorch · ONNX</text>

  <line class="flow" x1="214" y1="260" x2="262" y2="260" marker-end="url(#arrow)"/>

  <!-- AI 컴파일러 -->
  <rect x="270" y="140" width="360" height="240" rx="14" fill="#ffffff" stroke="#1f4e8c" stroke-width="1.5"/>
  <text class="t-title" x="450" y="173" text-anchor="middle">🛠️ AI 컴파일러</text>
  <text class="t-sub"   x="450" y="193" text-anchor="middle">모델을 하드웨어별 코드로 변환 · 최적화</text>

  <rect class="stage" x="294" y="220" width="96" height="56" rx="10"/>
  <text class="t-stage" x="342" y="245" text-anchor="middle">IR 변환</text>
  <text class="t-stage-sub" x="342" y="263" text-anchor="middle">그래프 중간 표현</text>

  <rect class="stage" x="402" y="220" width="96" height="56" rx="10"/>
  <text class="t-stage" x="450" y="245" text-anchor="middle">그래프 최적화</text>
  <text class="t-stage-sub" x="450" y="263" text-anchor="middle">연산자 융합 · 제거</text>

  <rect class="stage" x="510" y="220" width="96" height="56" rx="10"/>
  <text class="t-stage" x="558" y="245" text-anchor="middle">코드 생성</text>
  <text class="t-stage-sub" x="558" y="263" text-anchor="middle">타깃별 커널 생성</text>

  <line class="flow" x1="392" y1="248" x2="400" y2="248" marker-end="url(#arrow)"/>
  <line class="flow" x1="500" y1="248" x2="508" y2="248" marker-end="url(#arrow)"/>

  <!-- 오토튜닝 루프 -->
  <path class="flow" stroke-dasharray="4 4" d="M558,280 C558,318 450,318 450,284" marker-end="url(#arrow)"/>
  <text class="t-stage-sub" x="504" y="332" text-anchor="middle">오토튜닝 · 스케줄 탐색</text>

  <!-- 타깃 하드웨어 -->
  <line class="flow" x1="634" y1="260" x2="692" y2="182" marker-end="url(#arrow)"/>
  <line class="flow" x1="634" y1="260" x2="692" y2="260" marker-end="url(#arrow)"/>
  <line class="flow" x1="634" y1="260" x2="692" y2="338" marker-end="url(#arrow)"/>

  <rect class="box" x="700" y="150" width="150" height="64" rx="12"/>
  <text class="t-main" x="775" y="178" text-anchor="middle">CPU</text>
  <text class="t-sub"  x="775" y="196" text-anchor="middle">x86 · Arm</text>

  <rect class="box" x="700" y="228" width="150" height="64" rx="12"/>
  <text class="t-main" x="775" y="256" text-anchor="middle">GPU</text>
  <text class="t-sub"  x="775" y="274" text-anchor="middle">병렬 연산 가속</text>

  <rect class="box" x="700" y="306" width="150" height="64" rx="12"/>
  <text class="t-main" x="775" y="334" text-anchor="middle">NPU</text>
  <text class="t-sub"  x="775" y="352" text-anchor="middle">AI 전용 가속기</text>
</svg>
